device:
  gpu: false
model:
  beta: 1.0
  hidden_dim:
  - 128
  input_dim: 56
  latent_dim: 32
  learning_rate: 0.001
  non_linear: true
optuna:
  n_trials: 100
  search_space:
    batch_size:
      choices:
      - 32
      - 64
      type: categorical
    beta:
      choices:
      - 0.75
      - 1.0
      type: categorical
    hidden_dim:
      choices:
      - - 32
      - - 64
      - - 128
      type: categorical
    latent_dim:
      choices:
      - 16
      - 32
      type: categorical
    learning_rate:
      max: 1e-3
      min: 1e-5
      type: loguniform
  study_name: cvae_optimization
paths:
  data_dir: data/
  model_dir: models/
  output_dir: output/
training:
  batch_size: 64
  early_stopping_patience: 20
  epochs: 200
  mode: direct
  validation_split: 0.15
